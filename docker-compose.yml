services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: cms
      POSTGRES_DB: cms
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-changeme-in-production}"
      CLOUDINARY_CLOUD_NAME: "${CLOUDINARY_CLOUD_NAME}"
      CLOUDINARY_API_KEY: "${CLOUDINARY_API_KEY}"
      CLOUDINARY_API_SECRET: "${CLOUDINARY_API_SECRET}"
      # DB_DRIVER=mongo → MongoDB (default) | DB_DRIVER=postgres → PostgreSQL
      DB_DRIVER: "${DB_DRIVER:-mongo}"
      DB_HOST: "${DB_HOST:-mongodb}"
      DB_PORT: "${DB_PORT:-27017}"
      DB_NAME: "${DB_NAME:-cms}"
      DB_USERNAME: "${DB_USERNAME:-}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      DB_SSL_MODE: "${DB_SSL_MODE:-disable}"
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  mongo_data:
  pg_data:
