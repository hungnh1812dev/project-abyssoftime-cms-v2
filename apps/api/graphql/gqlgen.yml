schema:
  - graphql/schema/*.graphql

exec:
  filename: graphql/generated/generated.go
  package: generated

model:
  filename: graphql/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: graphql/resolver
  package: resolver
  filename_template: "{name}.resolvers.go"

autobind: []

directives:
  auth:
    skip_runtime: true

models:
  JSON:
    model: "github.com/99designs/gqlgen/graphql.Any"
  Time:
    model: "github.com/99designs/gqlgen/graphql.Time"
  # --- gqlcodegen models start ---
  MediaAsset:
    model: "project-abyssoftime-cms-v2/api/graphql/model.MediaAssetMap"
  ContentType:
    model: "project-abyssoftime-cms-v2/api/graphql/model.ContentTypeMap"
  ListMeta:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentListMap"
  PaginationMeta:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentListMap"
  CommonText:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvContact:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPage:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageList:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentListMap"
  CvPageSkills:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageExperiences:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageExperiencesRoles:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageProjects:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageEducations:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageLanguages:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  CvPageReferences:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  EnVocabPack:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentMap"
  EnVocabPackList:
    model: "project-abyssoftime-cms-v2/api/graphql/model.DocumentListMap"
  EnVocab:
