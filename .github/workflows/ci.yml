name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go API: vet + test ─────────────────────────────────────────────────────
  api-test:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

  # ── Frontend: lint + test + build ──────────────────────────────────────────
  web-lint:
    name: Web lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

  # ── Detect which directories changed ───────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'

  # ── Deploy to Render (main only, after tests pass, only if changed) ────────
  deploy-api:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    needs: [api-test, web-lint, changes]
    environment: Production
    if: needs.changes.outputs.api == 'true'

    steps:
      - name: Trigger Render deploy — API
        if: vars.RENDER_DEPLOY_HOOK_API != ''
        run: curl -fsSL "${{ vars.RENDER_DEPLOY_HOOK_API }}"

  deploy-web:
    name: Deploy Web to Render
    runs-on: ubuntu-latest
    needs: [api-test, web-lint, changes]
    environment: Production
    if: needs.changes.outputs.web == 'true'

    steps:
      - name: Trigger Render deploy — Web
        if: vars.RENDER_DEPLOY_HOOK_WEB != ''
        run: curl -fsSL "${{ vars.RENDER_DEPLOY_HOOK_WEB }}"
