name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Go API tests ────────────────────────────────────────────────────────────
  api-test:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

  # ── Frontend lint + unit tests ──────────────────────────────────────────────
  web-lint:
    name: Web lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # ── Docker image builds ─────────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api-test, web-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Render deploy hook (main only) ──────────────────────────────────────────
  render-deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy — API
        if: vars.RENDER_DEPLOY_HOOK_API != ''
        run: curl -fsSL "${{ vars.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render deploy — Web
        if: vars.RENDER_DEPLOY_HOOK_WEB != ''
        run: curl -fsSL "${{ vars.RENDER_DEPLOY_HOOK_WEB }}"
