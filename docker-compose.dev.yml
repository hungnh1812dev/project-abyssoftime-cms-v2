# Development hot-reload override.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  api:
    build:
      target: dev
    command: air
    volumes:
      - ./apps/api:/app
    ports:
      - "8080:8080"

  web:
    build:
      target: builder
    command: npm run dev -- --host
    volumes:
      - ./apps/web/src:/app/src
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
