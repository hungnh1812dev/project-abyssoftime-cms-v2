services:
  # ── Go API (Web Service, Docker, free tier) ────────────────────────────────
  # Docker build — use this if you need CGO or custom system dependencies.
  # For faster builds, see render.yaml (native Go runtime).
  - type: web
    name: cms-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    envVars:
      - key: PORT
        value: "8080"

      # ── Database (Supabase PostgreSQL) ─────────────────────────────────────
      - key: DB_DRIVER
        value: "postgres"
      - key: DB_HOST
        sync: false # e.g. aws-0-ap-southeast-1.pooler.supabase.com
      - key: DB_PORT
        value: "6543"
      - key: DB_NAME
        value: "postgres"
      - key: DB_USERNAME
        sync: false # e.g. postgres.xxxxxxxxxxxxxxxxxxxx
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: "require"

      # ── Auth ──────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true

      # ── Media storage ─────────────────────────────────────────────────────
      - key: STORAGE_PROVIDER
        value: "cloudinary"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── App config ────────────────────────────────────────────────────────
      - key: SUPPORTED_LOCALES
        value: "en,vi"
      - key: CONTENT_TYPES_DIR
        value: "/content-types"

  # ── React Frontend (Static Site, free tier) ─────────────────────────────────
  - type: web
    name: cms-web
    runtime: static
    plan: free
    buildCommand: cd apps/web && bun install --frozen-lockfile && bun run build
    staticPublishPath: apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /api/*
        destination: https://cms-api.onrender.com/api/*
      - type: rewrite
        source: /auth/*
        destination: https://cms-api.onrender.com/auth/*
      - type: rewrite
        source: /graphql
        destination: https://cms-api.onrender.com/graphql
      - type: rewrite
        source: /health
        destination: https://cms-api.onrender.com/health
      - type: rewrite
        source: /*
        destination: /index.html
