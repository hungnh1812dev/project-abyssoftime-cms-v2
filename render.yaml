services:
  # ── Go API (Web Service, free tier) ──────────────────────────────────────────
  - type: web
    name: cms-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    envVars:
      - key: PORT
        value: "8080"
      - key: MONGODB_URI
        sync: false  # Set manually — use MongoDB Atlas connection string
      - key: MONGODB_DB
        value: "cms"
      - key: JWT_SECRET
        generateValue: true
      - key: STORAGE_PROVIDER
        value: "cloudinary"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPPORTED_LOCALES
        value: "en,vi"
      - key: CONTENT_TYPES_DIR
        value: "content-types"

  # ── React Frontend (Static Site, free tier) ─────────────────────────────────
  - type: web
    name: cms-web
    runtime: static
    plan: free
    buildCommand: cd apps/web && npm ci && npm run build
    staticPublishPath: apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      # Proxy API calls to the backend service
      - type: rewrite
        source: /api/*
        destination: https://cms-api.onrender.com/api/*
      - type: rewrite
        source: /auth/*
        destination: https://cms-api.onrender.com/auth/*
      - type: rewrite
        source: /graphql
        destination: https://cms-api.onrender.com/graphql
      - type: rewrite
        source: /health
        destination: https://cms-api.onrender.com/health
      # SPA fallback — all other routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
